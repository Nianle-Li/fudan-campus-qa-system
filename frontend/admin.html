<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>复旦校园百事通 · 管理端</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">管</div>
        <div>
          <h1>复旦校园百事通</h1>
          <p>管理员数据治理与查询工作台</p>
        </div>
      </div>
      <nav class="app-nav" aria-label="前端入口">
        <a href="/">用户端</a>
        <a class="is-active" href="/admin.html">管理员端</a>
      </nav>
      <div id="health" class="status">连接中</div>
    </header>

    <main class="workspace">
      <section class="overview-strip" aria-label="系统数据概览">
        <article class="metric-tile">
          <span>校区</span>
          <strong id="adminCampusCount">--</strong>
        </article>
        <article class="metric-tile">
          <span>建筑</span>
          <strong id="adminBuildingCount">--</strong>
        </article>
        <article class="metric-tile">
          <span>设施</span>
          <strong id="adminFacilityCount">--</strong>
        </article>
        <article class="metric-tile">
          <span>活动</span>
          <strong id="adminActivityCount">--</strong>
        </article>
        <article class="metric-tile metric-tile-wide">
          <span>核心业务表</span>
          <strong>14</strong>
        </article>
      </section>

      <section class="panel feature-entry admin-feature-entry" aria-label="管理员端功能入口">
        <button class="feature-button is-active" type="button" data-admin-view="query" aria-pressed="true">
          <strong>查询工作台</strong>
          <span>传统筛选与自然语言查询</span>
        </button>
        <button class="feature-button" type="button" data-admin-view="browse" aria-pressed="false">
          <strong>自由浏览</strong>
          <span>历史、热门、数据表与 SQL 结果</span>
        </button>
        <button class="feature-button" type="button" data-admin-view="maintain" aria-pressed="false">
          <strong>数据维护</strong>
          <span>维护建筑、设施、活动与查询记录</span>
        </button>
      </section>

      <div id="message" class="message global-message" aria-live="polite"></div>

      <section class="panel query-panel view-section" data-admin-section="query">
        <div class="panel-title query-title">
          <h2>查询工作台</h2>
          <div class="mode-switch" role="tablist" aria-label="查询模式">
            <button class="mode-button is-active" type="button" data-query-mode="traditional">传统查询</button>
            <button class="mode-button" type="button" data-query-mode="natural">自然语言查询</button>
          </div>
        </div>

        <div id="traditionalPane" class="query-pane">
          <form id="traditionalQueryForm" class="traditional-form">
            <label>
              查询对象
              <select id="traditionalEntity" name="entity">
                <option value="campuses">校区</option>
                <option value="buildings">建筑</option>
                <option value="facilities">设施</option>
                <option value="courses">课程</option>
                <option value="activities">活动</option>
              </select>
            </label>
            <div id="traditionalFields" class="field-grid"></div>
            <div class="actions">
              <button type="submit">查询</button>
              <button id="clearTraditionalBtn" type="button" class="secondary-button">清空</button>
            </div>
          </form>
        </div>

        <div id="naturalPane" class="query-pane hidden">
          <form id="nlQueryForm" class="nl-form">
            <label>
              问句
              <textarea id="nlQuestion" name="question" rows="3" required>邯郸校区有哪些教学楼？</textarea>
            </label>
            <label class="compact-label">用户 ID<input name="user_id" type="number" min="1" value="4" /></label>
            <div class="question-chips">
              <button type="button" data-question="邯郸校区有哪些教学楼？">校区建筑</button>
              <button type="button" data-question="第二教学楼有哪些自习室？">建筑设施</button>
              <button type="button" data-question="李芳老师教什么课？">教师课程</button>
              <button type="button" data-question="数据库系统原理周几上课？">课程排课</button>
              <button type="button" data-question="近期有哪些校园活动？">近期活动</button>
              <button type="button" data-question="热门活动有哪些？">热门活动</button>
            </div>
            <div class="actions">
              <button id="askBtn" type="submit">查询</button>
            </div>
          </form>
        </div>

        <div id="queryResult" class="result-box"></div>
      </section>

      <section class="panel browse-panel view-section is-hidden" data-admin-section="browse">
        <div class="panel-title">
          <h2>自由浏览</h2>
          <button id="refreshBrowseBtn" type="button">刷新</button>
        </div>
        <div class="tabs browse-tabs" role="tablist" aria-label="浏览类型">
          <button class="tab is-active" type="button" data-browse="history">历史查询</button>
          <button class="tab" type="button" data-browse="popularQueries">热门查询</button>
          <button class="tab" type="button" data-browse="popularActivities">热门活动</button>
          <button class="tab" type="button" data-browse="data">数据表</button>
          <button class="tab" type="button" data-browse="sql">SQL</button>
        </div>
        <form id="browseFilterForm" class="browse-filter"></form>
        <div id="browseContent" class="table-wrap"></div>
      </section>

      <section class="panel form-panel view-section is-hidden" data-admin-section="maintain">
        <div class="panel-title">
          <h2>数据维护</h2>
        </div>
        <section class="csv-import-box" aria-label="CSV批量导入">
          <div>
            <h3>CSV 批量导入</h3>
            <p id="csvImportHint">选择导入对象后上传 UTF-8 CSV 文件，首行必须是字段名。</p>
          </div>
          <form id="csvImportForm" class="csv-import-form">
            <label>
              导入对象
              <select id="csvImportEntity" name="entity">
                <option value="buildings">建筑</option>
                <option value="facilities">设施</option>
                <option value="activities">活动</option>
                <option value="query_logs">查询记录</option>
              </select>
            </label>
            <label>
              CSV 文件
              <input id="csvImportFile" name="file" type="file" accept=".csv,text/csv" required />
            </label>
            <div class="actions">
              <button type="submit">导入 CSV</button>
              <button id="downloadCsvTemplateBtn" type="button" class="secondary-button">模板</button>
            </div>
          </form>
          <div id="csvImportResult" class="import-result"></div>
        </section>

        <div class="tabs maintenance-tabs" role="tablist" aria-label="维护对象">
          <button class="tab is-active" data-form="buildingForm" type="button">建筑</button>
          <button class="tab" data-form="facilityForm" type="button">设施</button>
          <button class="tab" data-form="activityForm" type="button">活动</button>
          <button class="tab" data-form="queryLogForm" type="button">查询记录</button>
        </div>

        <form id="buildingForm" class="crud-form">
          <input type="hidden" name="building_id" />
          <label>建筑名称<input name="name" required placeholder="例如：新教学楼" /></label>
          <label>建筑类型<select name="type" data-options="buildingTypes"></select></label>
          <label>所属校区<select name="campus_id" data-options="campuses"></select></label>
          <div class="actions">
            <button type="submit">保存</button>
            <button type="button" data-reset="buildingForm" class="secondary-button">清空</button>
            <button type="button" data-delete="building" class="danger-button">删除</button>
          </div>
        </form>

        <form id="facilityForm" class="crud-form hidden">
          <input type="hidden" name="facility_id" />
          <label>设施名称<input name="name" required placeholder="例如：H2501" /></label>
          <label>设施类型<select name="type" data-options="facilityTypes"></select></label>
          <label>开放时间<input name="open_time" required placeholder="每日 08:00-22:00" /></label>
          <label>所属建筑<select name="building_id" data-options="buildings"></select></label>
          <div class="actions">
            <button type="submit">保存</button>
            <button type="button" data-reset="facilityForm" class="secondary-button">清空</button>
            <button type="button" data-delete="facility" class="danger-button">删除</button>
          </div>
        </form>

        <form id="activityForm" class="crud-form hidden">
          <input type="hidden" name="activity_id" />
          <label>活动名称<input name="name" required placeholder="例如：数据库答疑会" /></label>
          <label>主办单位<input name="organizer" required placeholder="计算机科学技术学院" /></label>
          <label>开始时间<input name="start_time" type="datetime-local" required /></label>
          <label>结束时间<input name="end_time" type="datetime-local" /></label>
          <label>举办设施<select name="facility_id" data-options="facilities"></select></label>
          <label>活动简介<textarea name="description" rows="4" required></textarea></label>
          <div class="actions">
            <button type="submit">保存</button>
            <button type="button" data-reset="activityForm" class="secondary-button">清空</button>
            <button type="button" data-delete="activity" class="danger-button">删除</button>
          </div>
        </form>

        <form id="queryLogForm" class="crud-form hidden">
          <label>用户 ID<input name="user_id" type="number" min="1" required value="4" /></label>
          <label>查询类别<select name="query_category" data-options="queryCategories"></select></label>
          <label>查询内容<input name="query_content" required placeholder="例如：近期有哪些校园活动" /></label>
          <div class="actions">
            <button type="submit">写入记录</button>
            <button type="button" data-reset="queryLogForm" class="secondary-button">清空</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
