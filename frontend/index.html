<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>复旦校园百事通 · 用户端</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="user-shell">
    <header class="topbar user-topbar">
      <div>
        <h1>复旦校园百事通</h1>
        <p>活动预约、校园查询与个人行程</p>
      </div>
      <nav class="app-nav" aria-label="前端入口">
        <a class="is-active" href="/">用户端</a>
        <a href="/admin.html">管理员端</a>
      </nav>
      <div id="health" class="status">连接中</div>
    </header>

    <main class="user-workspace">
      <section class="panel user-hero">
        <div class="hero-copy">
          <span class="eyebrow">Campus Assistant</span>
          <h2>查活动、约名额、看安排，一屏完成</h2>
          <p>选择身份后即可浏览近期活动并预约，也可以用自然语言直接询问课程、设施、活动和校区信息。</p>
        </div>
        <div class="hero-controls">
          <label>
            当前用户
            <select id="userSelect"></select>
          </label>
          <div id="userProfile" class="profile-strip"></div>
        </div>
      </section>

      <section class="panel activity-panel">
        <div class="panel-title">
          <h2>活动预约</h2>
          <button id="refreshActivitiesBtn" type="button">刷新</button>
        </div>
        <form id="activityFilterForm" class="user-filter">
          <label>关键词<input name="q" type="search" placeholder="活动、主办方、地点" /></label>
          <label>校区<select name="campus_id" id="campusFilter"></select></label>
          <label>开始不早于<input name="start_from" type="datetime-local" /></label>
          <div class="actions">
            <button type="submit">筛选</button>
            <button id="clearActivityFilterBtn" type="button" class="secondary-button">清空</button>
          </div>
        </form>
        <div id="activityCards" class="activity-grid"></div>
      </section>

      <aside class="panel reservation-panel">
        <div class="panel-title">
          <h2>我的预约</h2>
          <button id="refreshReservationsBtn" type="button">刷新</button>
        </div>
        <div id="reservationList" class="reservation-list"></div>
      </aside>

      <section class="panel assistant-panel">
        <div class="panel-title">
          <h2>自然语言查询</h2>
        </div>
        <form id="nlQueryForm" class="user-nl-form">
          <textarea id="nlQuestion" name="question" rows="3" required>近期有哪些校园活动？</textarea>
          <input name="user_id" type="hidden" value="4" />
          <div class="question-chips">
            <button type="button" data-question="近期有哪些校园活动？">近期活动</button>
            <button type="button" data-question="第二教学楼有哪些自习室？">自习空间</button>
            <button type="button" data-question="数据库系统原理周几上课？">课程安排</button>
            <button type="button" data-question="热门活动有哪些？">热门活动</button>
          </div>
          <div class="actions">
            <button type="submit">提问</button>
          </div>
        </form>
        <div id="nlAnswer" class="answer-box compact-answer"></div>
      </section>

      <section class="panel explore-panel">
        <div class="panel-title">
          <h2>校园速览</h2>
          <select id="exploreEntity">
            <option value="facilities">设施</option>
            <option value="courses">课程</option>
            <option value="buildings">建筑</option>
          </select>
        </div>
        <form id="exploreForm" class="explore-form">
          <input name="q" type="search" placeholder="输入关键词快速查看" />
          <button type="submit">查看</button>
        </form>
        <div id="exploreContent" class="compact-list"></div>
      </section>

      <div id="message" class="toast-message" aria-live="polite"></div>
    </main>

    <script src="/user.js"></script>
  </body>
</html>
