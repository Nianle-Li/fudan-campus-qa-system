<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>复旦校园百事通 · 用户端</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="user-shell">
    <header class="topbar user-topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">复</div>
        <div>
          <h1>复旦校园百事通</h1>
          <p>活动预约、校园查询与个人行程</p>
        </div>
      </div>
      <nav class="app-nav" aria-label="前端入口">
        <a class="is-active" href="/">用户端</a>
        <a href="/admin.html">管理员端</a>
      </nav>
      <div id="health" class="status">连接中</div>
    </header>

    <main class="user-workspace">
      <section class="panel user-hero">
        <div class="hero-copy">
          <span class="eyebrow">Campus Assistant</span>
          <h2>按功能进入校园服务</h2>
          <p>先选择身份，再进入活动预约、我的预约、自然语言查询或校园速览等独立界面。</p>
          <div class="hero-stats" aria-label="用户端数据概览">
            <div>
              <strong id="userCampusCount">--</strong>
              <span>校区</span>
            </div>
            <div>
              <strong id="userActivityCount">--</strong>
              <span>当前活动</span>
            </div>
            <div>
              <strong id="userReservationCount">--</strong>
              <span>我的预约</span>
            </div>
          </div>
        </div>
        <div class="hero-controls">
          <label>
            当前用户
            <select id="userSelect"></select>
          </label>
          <div id="userProfile" class="profile-strip"></div>
        </div>
      </section>

      <section class="panel feature-entry user-feature-entry" aria-label="用户端功能入口">
        <button class="feature-button is-active" type="button" data-user-view="activities" aria-pressed="true">
          <strong>活动预约</strong>
          <span>筛选近期活动并预约名额</span>
        </button>
        <button class="feature-button" type="button" data-user-view="reservations" aria-pressed="false">
          <strong>我的预约</strong>
          <span>查看与取消当前用户预约</span>
        </button>
        <button class="feature-button" type="button" data-user-view="assistant" aria-pressed="false">
          <strong>自然语言查询</strong>
          <span>用中文问句查询课程、设施和活动</span>
        </button>
        <button class="feature-button" type="button" data-user-view="explore" aria-pressed="false">
          <strong>校园速览</strong>
          <span>快速浏览设施、课程和建筑</span>
        </button>
        <button class="feature-button" type="button" data-user-view="popular" aria-pressed="false">
          <strong>热门查询</strong>
          <span>查看大家最近关注的信息类别</span>
        </button>
      </section>

      <section class="panel activity-panel view-section" data-user-section="activities">
        <div class="panel-title">
          <h2>活动预约</h2>
          <button id="refreshActivitiesBtn" type="button">刷新</button>
        </div>
        <form id="activityFilterForm" class="user-filter">
          <label>关键词<input name="q" type="search" placeholder="活动、主办方、地点" /></label>
          <label>校区<select name="campus_id" id="campusFilter"></select></label>
          <label>开始不早于<input name="start_from" type="datetime-local" /></label>
          <div class="actions">
            <button type="submit">筛选</button>
            <button id="clearActivityFilterBtn" type="button" class="secondary-button">清空</button>
          </div>
        </form>
        <div id="activityCards" class="activity-grid"></div>
      </section>

      <aside class="panel reservation-panel view-section is-hidden" data-user-section="reservations">
        <div class="panel-title">
          <h2>我的预约</h2>
          <button id="refreshReservationsBtn" type="button">刷新</button>
        </div>
        <div id="reservationList" class="reservation-list"></div>
      </aside>

      <section class="panel assistant-panel view-section is-hidden" data-user-section="assistant">
        <div class="panel-title">
          <h2>自然语言查询</h2>
        </div>
        <form id="nlQueryForm" class="user-nl-form">
          <textarea id="nlQuestion" name="question" rows="3" required>近期有哪些校园活动？</textarea>
          <input name="user_id" type="hidden" value="4" />
          <div class="question-chips">
            <button type="button" data-question="近期有哪些校园活动？">近期活动</button>
            <button type="button" data-question="第二教学楼有哪些自习室？">自习空间</button>
            <button type="button" data-question="数据库系统原理周几上课？">课程安排</button>
            <button type="button" data-question="热门活动有哪些？">热门活动</button>
          </div>
          <div class="actions">
            <button type="submit">提问</button>
          </div>
        </form>
        <div id="nlAnswer" class="answer-box compact-answer"></div>
      </section>

      <section class="panel explore-panel view-section is-hidden" data-user-section="explore">
        <div class="panel-title">
          <h2>校园速览</h2>
          <select id="exploreEntity">
            <option value="facilities">设施</option>
            <option value="courses">课程</option>
            <option value="buildings">建筑</option>
          </select>
        </div>
        <form id="exploreForm" class="explore-form">
          <input name="q" type="search" placeholder="输入关键词快速查看" />
          <button type="submit">查看</button>
        </form>
        <div id="exploreContent" class="compact-list"></div>
      </section>

      <section class="panel popular-panel view-section is-hidden" data-user-section="popular">
        <div class="panel-title">
          <h2>热门查询</h2>
          <button id="refreshPopularQueriesBtn" type="button">刷新</button>
        </div>
        <div id="popularQueryContent" class="popular-query-board"></div>
      </section>

      <div id="message" class="toast-message" aria-live="polite"></div>
    </main>

    <script src="/user.js"></script>
  </body>
</html>
